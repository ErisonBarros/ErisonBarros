name: Update Links Every 15 Days

on:
  schedule:
    - cron: '0 0 */15 * *' # Runs at 00:00 every 15 days
  workflow_dispatch: # Allows running manually

jobs:
  update-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install duckduckgo-search requests beautifulsoup4

      - name: Run script
        run: python update_links.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update links in README" && git push)
